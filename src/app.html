<!doctype html>
<html lang="en" class="bg-base-100">
	<head>
		<meta charset="utf-8" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="icon" href="%sveltekit.assets%/icons/any/32.png" sizes="32x32" />
		<link rel="icon" href="%sveltekit.assets%/icons/any/64.png" sizes="64x64" />
		<link rel="icon" href="%sveltekit.assets%/icons/any/128.png" />
		<meta name="viewport" content="width=device-width" />
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<script>
			const savedTheme = window.localStorage.getItem('theme');
			if (savedTheme) {
				document.documentElement.setAttribute('data-theme', savedTheme);
			}
		</script>

		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
